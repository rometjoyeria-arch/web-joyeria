<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/svg+xml" href="https://rometjoyeria.com/vite.svg">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Romet Joyería IA - Alta Joyería</title>
	<meta name="description" content="Diseña tu joya personalizada con inteligencia artificial o sube tu propio diseño.">
	<link rel="stylesheet" crossorigin="" href="./index_files/index-xtSdOPat.css?v=2">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script>
		window.addEventListener('load', () => initWhenReady(() => initHeaderAuth()));
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen flex flex-col relative bg-background overflow-hidden">

			<header class="bg-background border-b border-border px-8 py-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
				<a class="hover:opacity-70 transition-opacity" href="https://rometjoyeria.com/">
					<span class="font-bold text-2xl md:text-3xl tracking-[0.2em] uppercase text-foreground">ROMET IA</span>
				</a>
				<nav class="flex items-center gap-8">
					<a href="https://rometjoyeria.com/designer"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">
						Diseñar Joya
					</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">
						Mi Cuenta
					</a>
				</nav>
			</header>

			<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-white rounded-full blur-[120px] opacity-50 pointer-events-none"></div>

			<main class="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-6">
				<div class="max-w-5xl mx-auto flex flex-col items-center w-full" style="opacity: 1; transform: none;">
					<h1 class="text-5xl md:text-7xl lg:text-8xl font-bold text-foreground mb-6 tracking-[0.1em] leading-tight">
						ROMET JOYERÍA
					</h1>
					<p class="text-xl md:text-2xl text-muted-foreground mb-16 font-light tracking-[0.2em] max-w-2xl uppercase">
						Alta joyería a tu medida
					</p>
					<div class="flex flex-col sm:flex-row gap-6 items-stretch justify-center w-full max-w-4xl mx-auto">
						<a href="https://rometjoyeria.com/designer"
						   class="flex-1 px-8 py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-sm md:text-base tracking-[0.2em] uppercase rounded-none hover:bg-[hsl(var(--button-hover))] transition-all duration-500 elegant-shadow font-medium flex items-center justify-center text-center min-h-[64px]"
						   style="text-decoration:none;"
						   onclick="handleDesignerClick(event)">
							Diseña tu joya desde cero
						</a>
						<a href="https://rometjoyeria.com/upload-design"
						   class="flex-1 px-8 py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-sm md:text-base tracking-[0.2em] uppercase rounded-none hover:bg-[hsl(var(--button-hover))] transition-all duration-500 elegant-shadow font-medium flex items-center justify-center text-center min-h-[64px]"
						   style="text-decoration:none;"
						   onclick="handleUploadClick(event)">
							¿Tienes un diseño? Te lo hacemos
						</a>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script>
		async function requireAuthAndRedirect(e, destination) {
			e.preventDefault();
			try {
				await new Promise((resolve) => initWhenReady(resolve));
				const sb = getSupabase();
				const { data: { session } } = await sb.auth.getSession();
				if (session) {
					window.location.href = destination;
				} else {
					sessionStorage.setItem('redirectAfterLogin', destination);
					window.location.href = './login.html';
				}
			} catch (err) {
				sessionStorage.setItem('redirectAfterLogin', destination);
				window.location.href = './login.html';
			}
		}

		function handleDesignerClick(e) {
			requireAuthAndRedirect(e, 'https://rometjoyeria.com/designer');
		}

		function handleUploadClick(e) {
			requireAuthAndRedirect(e, 'https://rometjoyeria.com/upload-design');
		}
	</script>
</body>
</html>
