<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/png" href="./favicon.png">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Diseñador - Romet Joyería IA</title>
	<link rel="stylesheet" crossorigin="" href="./designer-paso2_files/index-xtSdOPat.css?v=2">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/designer-integration.js"></script>
	<script>
		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				}
			});
			initHeaderAuth();
		});
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col pb-32 font-serif">

			<header class="bg-background border-b border-border px-4 md:px-8 py-4 md:py-6 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50 shadow-sm">
				<a href="https://rometjoyeria.com/">
					<img src="./logo-romet.png" alt="Romet Joyería" style="height: 48px; width: auto; mix-blend-mode: multiply;">
				</a>
				<nav class="flex items-center flex-wrap justify-center gap-4 md:gap-8">
					<a href="https://rometjoyeria.com/designer-paso1.html"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Diseñar Joya</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Mi Cuenta</a>
				</nav>
			</header>

			<div class="w-full bg-muted h-1.5 sticky top-[84px] z-40">
				<div class="bg-primary h-full transition-all duration-500 ease-out" style="width: 28.57%;"></div>
			</div>

			<main class="flex-1 container mx-auto px-4 py-12 flex flex-col relative mt-4">
				<div class="text-center mb-16">
					<span class="text-sm tracking-[0.2em] uppercase text-muted-foreground mb-4 block font-sans">Paso 2 de 7</span>
					<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium">Selección de Material</h1>
				</div>

				<div class="flex-1 relative">
					<div class="w-full" style="opacity: 1; transform: none;">
						<div class="grid grid-cols-2 md:grid-cols-5 gap-8 max-w-5xl mx-auto">

							<div class="cursor-pointer flex flex-col items-center justify-center transition-all duration-300 hover:scale-105" onclick="selectOption(this, 'material', 'oro_amarillo')">
								<div class="w-[100px] h-[100px] rounded-full mb-6 relative transition-all duration-300 ring-1 ring-border shadow-md hover:shadow-lg" style="background-color: rgb(255, 215, 0);"></div>
								<span class="text-foreground text-xs sm:text-sm md:text-base tracking-widest uppercase font-medium text-center w-full break-words">Oro Amarillo</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center transition-all duration-300 hover:scale-105" onclick="selectOption(this, 'material', 'oro_blanco')">
								<div class="w-[100px] h-[100px] rounded-full mb-6 relative transition-all duration-300 ring-1 ring-border shadow-md hover:shadow-lg" style="background-color: rgb(248, 249, 250);"></div>
								<span class="text-foreground text-xs sm:text-sm md:text-base tracking-widest uppercase font-medium text-center w-full break-words">Oro Blanco</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center transition-all duration-300 hover:scale-105" onclick="selectOption(this, 'material', 'oro_rosa')">
								<div class="w-[100px] h-[100px] rounded-full mb-6 relative transition-all duration-300 ring-1 ring-border shadow-md hover:shadow-lg" style="background-color: rgb(224, 191, 184);"></div>
								<span class="text-foreground text-xs sm:text-sm md:text-base tracking-widest uppercase font-medium text-center w-full break-words">Oro Rosa</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center transition-all duration-300 hover:scale-105" onclick="selectOption(this, 'material', 'platino')">
								<div class="w-[100px] h-[100px] rounded-full mb-6 relative transition-all duration-300 ring-1 ring-border shadow-md hover:shadow-lg" style="background-color: rgb(229, 228, 226);"></div>
								<span class="text-foreground text-xs sm:text-sm md:text-base tracking-widest uppercase font-medium text-center w-full break-words">Platino</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center transition-all duration-300 hover:scale-105" onclick="selectOption(this, 'material', 'plata')">
								<div class="w-[100px] h-[100px] rounded-full mb-6 relative transition-all duration-300 ring-1 ring-border shadow-md hover:shadow-lg" style="background-color: rgb(192, 192, 192);"></div>
								<span class="text-foreground text-xs sm:text-sm md:text-base tracking-widest uppercase font-medium text-center w-full break-words">Plata</span>
							</div>

						</div>
					</div>
				</div>
			</main>

			<div class="fixed bottom-0 left-0 w-full p-4 md:p-6 pointer-events-none z-40">
				<div class="container mx-auto flex justify-between items-center">
					<button onclick="window.location.href='./designer-paso1.html'"
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 text-muted-foreground hover:text-foreground transition-colors bg-background/90 backdrop-blur-sm py-2.5 px-5 md:py-3 md:px-6 rounded-full shadow-md border border-border/50">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path>
						</svg>
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Volver</span>
					</button>
					<button id="nextBtn" onclick="goToNext('./designer-paso3.html')" disabled
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 bg-primary text-primary-foreground hover:bg-foreground transition-colors py-2.5 px-6 md:py-3 md:px-8 rounded-full shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Siguiente</span>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>
						</svg>
					</button>
				</div>
			</div>

		</div>
	</div>

	<script>
		function selectOption(el, key, value) {
			document.querySelectorAll('.cursor-pointer').forEach(e => {
				e.style.opacity = '0.5';
				const circle = e.querySelector('.rounded-full');
				if (circle) circle.style.outline = '';
			});
			el.style.opacity = '1';
			const circle = el.querySelector('.rounded-full');
			if (circle) circle.style.outline = '3px solid hsl(var(--primary))';
			const state = window.RometDesigner?.loadState() || {};
			state[key] = value;
			window.RometDesigner?.saveState(state);
			document.getElementById('nextBtn').disabled = false;
			setTimeout(() => goToNext('./designer-paso3.html'), 300);
		}

		function goToNext(url) {
			window.location.href = url;
		}
	</script>
</body>
</html>
