<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/svg+xml" href="https://rometjoyeria.com/vite.svg">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Diseñador - Romet Joyería IA</title>
	<script type="module" crossorigin="" src="./designer-paso3_files/index-8FY5Tnxd.js?v=2"></script>
	<link rel="stylesheet" crossorigin="" href="./designer-paso3_files/index-xtSdOPat.css?v=2">

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/designer-integration.js"></script>
	<script>
		initWhenReady(() => {
			getSupabase().auth.getSession().then(({ data: { session } }) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				}
			});
			initHeaderAuth();
		});
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col pb-32 font-serif">

			<header class="bg-background border-b border-border px-8 py-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
				<a class="hover:opacity-70 transition-opacity" href="https://rometjoyeria.com/">
					<span class="font-bold text-2xl md:text-3xl tracking-[0.2em] uppercase text-foreground">ROMET IA</span>
				</a>
				<nav class="flex items-center gap-8">
					<a href="https://rometjoyeria.com/designer"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Diseñar Joya</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Mi Cuenta</a>
				</nav>
			</header>

			<div class="w-full bg-muted h-1.5 sticky top-[84px] z-40">
				<div class="bg-primary h-full transition-all duration-500 ease-out" style="width: 42.85%;"></div>
			</div>

			<main class="flex-1 container mx-auto px-4 py-12 flex flex-col relative mt-4">
				<div class="text-center mb-16">
					<span class="text-sm tracking-[0.2em] uppercase text-muted-foreground mb-4 block font-sans">Paso 3 de 7</span>
					<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium">Perfil de Usuario</h1>
				</div>

				<div class="flex-1 relative">
					<div class="w-full" style="opacity: 1; transform: none;">
						<div class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-5xl mx-auto">

							<div class="cursor-pointer group relative overflow-visible rounded-xl transition-all duration-300 border flex flex-col h-full border-transparent hover:border-primary/30 hover:shadow-md" onclick="selectOption(this, 'profile', 'senora')">
								<div class="aspect-square w-full relative bg-muted rounded-xl overflow-hidden">
									<img src="./designer-paso3_files/photo-1675676709024-d04aaf71415f" alt="Señora" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
									<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
									<div class="absolute bottom-0 left-0 right-0 p-6 text-center z-10">
										<span class="text-white text-2xl tracking-widest uppercase drop-shadow-md font-medium">Señora</span>
									</div>
								</div>
							</div>

							<div class="cursor-pointer group relative overflow-visible rounded-xl transition-all duration-300 border flex flex-col h-full border-transparent hover:border-primary/30 hover:shadow-md" onclick="selectOption(this, 'profile', 'caballero')">
								<div class="aspect-square w-full relative bg-muted rounded-xl overflow-hidden">
									<img src="./designer-paso3_files/photo-1571582665859-4a5f472ee21b" alt="Caballero" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
									<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
									<div class="absolute bottom-0 left-0 right-0 p-6 text-center z-10">
										<span class="text-white text-2xl tracking-widest uppercase drop-shadow-md font-medium">Caballero</span>
									</div>
								</div>
							</div>

							<div class="cursor-pointer group relative overflow-visible rounded-xl transition-all duration-300 border flex flex-col h-full border-transparent hover:border-primary/30 hover:shadow-md" onclick="selectOption(this, 'profile', 'cadete')">
								<div class="aspect-square w-full relative bg-muted rounded-xl overflow-hidden">
									<img src="./designer-paso3_files/photo-1537518141759-a88a60b4db31" alt="Cadete" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
									<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
									<div class="absolute bottom-0 left-0 right-0 p-6 text-center z-10">
										<span class="text-white text-2xl tracking-widest uppercase drop-shadow-md font-medium">Cadete</span>
									</div>
								</div>
							</div>

							<div class="cursor-pointer group relative overflow-visible rounded-xl transition-all duration-300 border flex flex-col h-full border-transparent hover:border-primary/30 hover:shadow-md" onclick="selectOption(this, 'profile', 'nino')">
								<div class="aspect-square w-full relative bg-muted rounded-xl overflow-hidden">
									<img src="./designer-paso3_files/photo-1537518141759-a88a60b4db31" alt="Niño" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
									<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
									<div class="absolute bottom-0 left-0 right-0 p-6 text-center z-10">
										<span class="text-white text-2xl tracking-widest uppercase drop-shadow-md font-medium">Niño</span>
									</div>
								</div>
							</div>

						</div>
					</div>
				</div>
			</main>

			<div class="fixed bottom-0 left-0 w-full p-4 md:p-6 pointer-events-none z-40">
				<div class="container mx-auto flex justify-between items-center">
					<button onclick="window.location.href='./designer-paso2.html'"
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 text-muted-foreground hover:text-foreground transition-colors bg-background/90 backdrop-blur-sm py-2.5 px-5 md:py-3 md:px-6 rounded-full shadow-md border border-border/50">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path>
						</svg>
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Volver</span>
					</button>
					<button id="nextBtn" onclick="goToNext('./designer-paso3.html')" disabled
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 bg-primary text-primary-foreground hover:bg-foreground transition-colors py-2.5 px-6 md:py-3 md:px-8 rounded-full shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Siguiente</span>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>
						</svg>
					</button>
				</div>
			</div>

		</div>
	</div>

	<script>
		function selectOption(el, key, value) {
			document.querySelectorAll('.cursor-pointer').forEach(e => {
				e.classList.remove('border-primary', 'shadow-lg', 'ring-2', 'ring-primary/20', 'scale-[1.02]');
				e.classList.add('border-transparent');
			});

			el.classList.remove('border-transparent');
			el.classList.add('border-primary', 'shadow-lg', 'ring-2', 'ring-primary/20', 'scale-[1.02]');

			const state = window.RometDesigner?.loadState() || {};
			state[key] = value;
			window.RometDesigner?.saveState(state);

			document.getElementById('nextBtn').disabled = false;
		}

		function goToNext(url) {
			window.location.href = url;
		}
	</script>
</body>
</html>
