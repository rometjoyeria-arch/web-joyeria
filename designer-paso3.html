<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/svg+xml" href="https://rometjoyeria.com/vite.svg">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Diseñador - Romet Joyería IA</title>
	<script type="module" crossorigin="" src="./designer-paso3_files/index-8FY5Tnxd.js?v=2"></script>
	<link rel="stylesheet" crossorigin="" href="./designer-paso3_files/index-xtSdOPat.css?v=2">

	<!-- Supabase + integración -->
	<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/designer-integration.js"></script>
<script>
    window.addEventListener('load', () => {
        getSupabase().auth.getSession().then(({ data: { session } }) => {
            if (!session) {
                sessionStorage.setItem('redirectAfterLogin', window.location.href);
                window.location.href = './login.html';
            }
        });
        initHeaderAuth();
    });
</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col pb-32 font-serif">

			<!-- Header -->
			<header class="bg-background border-b border-border px-8 py-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
				<a class="hover:opacity-70 transition-opacity" href="https://rometjoyeria.com/">
					<span class="font-bold text-2xl md:text-3xl tracking-[0.2em] uppercase text-foreground">ROMET IA</span>
				</a>
				<nav class="flex items-center gap-8">
					<a href="https://rometjoyeria.com/designer"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">
						Diseñar Joya
					</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">
						Mi Cuenta
					</a>
				</nav>
			</header>

			<!-- Barra de progreso -->
			<div class="w-full bg-muted h-1.5 sticky top-[84px] z-40">
				<div class="bg-primary h-full transition-all duration-500 ease-out" style="width: 57.14%;"></div>
			</div>

			<!-- Main -->
			<main class="flex-1 container mx-auto px-4 py-12 flex flex-col relative mt-4">
				<div class="text-center mb-16">
					<span class="text-sm tracking-[0.2em] uppercase text-muted-foreground mb-4 block font-sans">Paso 4 de 7</span>
					<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium">Gema Principal</h1>
				</div>

				<div class="flex-1 relative">
					<div class="w-full" style="opacity: 1; transform: none;">
						<div class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-6xl mx-auto">

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'diamante')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1631013636761-c533d81e96a4?auto=format&fit=crop&w=200&q=80" alt="Diamante" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Diamante</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'esmeralda')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1599643477877-530eb83abc8e?auto=format&fit=crop&w=200&q=80" alt="Esmeralda" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Esmeralda</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'perla')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1682629846138-7db022565bd5?auto=format&fit=crop&w=200&q=80" alt="Perla" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Perla</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'zafiro')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1671859709739-bead1c52d3ad?auto=format&fit=crop&w=200&q=80" alt="Zafiro" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Zafiro</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'coral')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1599707367072-cd6ada2bc375?auto=format&fit=crop&w=200&q=80" alt="Coral" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Coral</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'rubi')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1598862662104-22c4e906a7ed?auto=format&fit=crop&w=200&q=80" alt="Rubí" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Rubí</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'turquesa')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1676303679132-96fba30aae28?auto=format&fit=crop&w=200&q=80" alt="Turquesa" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Turquesa</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'aguamarina')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1702974898342-31e6d5c711f9?auto=format&fit=crop&w=200&q=80" alt="Aguamarina" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Aguamarina</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'topacio')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img src="https://images.unsplash.com/photo-1679437030366-618d66872c2c?auto=format&fit=crop&w=200&q=80" alt="Topacio" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Topacio</span>
							</div>

						</div>
					</div>
				</div>
			</main>

			<!-- Navegación inferior -->
			<div class="fixed bottom-0 left-0 w-full p-4 md:p-6 pointer-events-none z-40">
				<div class="container mx-auto flex justify-between items-center">
					<button onclick="window.location.href='./designer-paso2.html'"
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 text-muted-foreground hover:text-foreground transition-colors bg-background/90 backdrop-blur-sm py-2.5 px-5 md:py-3 md:px-6 rounded-full shadow-md border border-border/50">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="m12 19-7-7 7-7"></path>
							<path d="M19 12H5"></path>
						</svg>
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Volver</span>
					</button>
					<button id="nextBtn" onclick="goToNext('./designer-paso4.html')" disabled
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 bg-primary text-primary-foreground hover:bg-foreground transition-colors py-2.5 px-6 md:py-3 md:px-8 rounded-full shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Siguiente</span>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="M5 12h14"></path>
							<path d="m12 5 7 7-7 7"></path>
						</svg>
					</button>
				</div>
			</div>

		</div>
	</div>

	<script>
		function selectOption(el, key, value) {
			document.querySelectorAll('.cursor-pointer').forEach(e => {
				e.style.opacity = '0.5';
				e.style.borderColor = 'transparent';
			});

			el.style.opacity = '1';
			el.style.borderColor = 'hsl(var(--primary))';

			const state = window.RometDesigner?.loadState() || {};
			state[key] = value;
			window.RometDesigner?.saveState(state);

			document.getElementById('nextBtn').disabled = false;
		}

		function goToNext(url) {
			window.location.href = url;
		}
	</script>
</body>
</html>
