<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/svg+xml" href="https://rometjoyeria.com/vite.svg">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Diseñador - Romet Joyería IA</title>
	<link rel="stylesheet" crossorigin="" href="./designer-paso7_files/index-xtSdOPat.css?v=2">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/designer-integration.js"></script>
	<script>
		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				}
			});
			initHeaderAuth();
		});
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col pb-32 font-serif">

			<header class="bg-background border-b border-border px-8 py-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
				<a class="hover:opacity-70 transition-opacity" href="https://rometjoyeria.com/">
					<span class="font-bold text-2xl md:text-3xl tracking-[0.2em] uppercase text-foreground">ROMET IA</span>
				</a>
				<nav class="flex items-center gap-8">
					<a href="https://rometjoyeria.com/designer-paso1.html"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Diseñar Joya</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Mi Cuenta</a>
				</nav>
			</header>

			<div class="w-full bg-muted h-1.5 sticky top-[84px] z-40">
				<div class="bg-primary h-full transition-all duration-500 ease-out" style="width: 100%;"></div>
			</div>

			<main class="flex-1 container mx-auto px-4 py-12 flex flex-col relative mt-4">
				<div class="text-center mb-16">
					<span class="text-sm tracking-[0.2em] uppercase text-muted-foreground mb-4 block font-sans">Paso 7 de 7</span>
					<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium">Registro y Personalización</h1>
				</div>

				<div class="flex-1 relative">
					<div class="w-full" style="opacity: 1; transform: none;">
						<div class="max-w-2xl mx-auto bg-white p-10 md:p-16 shadow-lg rounded-xl border border-border/50 relative overflow-hidden">
							<form class="space-y-8">

								<div class="space-y-2">
									<label class="text-sm tracking-widest uppercase text-muted-foreground font-medium">Nombre *</label>
									<input type="text" required
									       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-lg font-serif"
									       value="">
								</div>

								<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
									<div class="space-y-2">
										<label class="text-sm tracking-widest uppercase text-muted-foreground font-medium">Teléfono *</label>
										<input type="tel" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-lg font-serif"
										       value="">
									</div>
									<div class="space-y-2">
										<label class="text-sm tracking-widest uppercase text-muted-foreground font-medium">Correo Electrónico *</label>
										<input type="email" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-lg font-serif"
										       value="">
									</div>
								</div>

								<div class="space-y-2">
									<label class="text-sm tracking-widest uppercase text-muted-foreground font-medium">Sugerencias o indicaciones especiales</label>
									<textarea placeholder="ej. grabado conmemorativo"
									          class="w-full border border-border p-4 bg-transparent text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary transition-all duration-300 text-lg font-serif min-h-[100px] resize-y rounded-md"></textarea>
								</div>

								<div class="pt-8">
									<button type="submit" disabled
									        class="w-full py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-lg tracking-[0.2em] uppercase hover:bg-[hsl(var(--button-hover))] transition-colors duration-500 disabled:opacity-50 disabled:cursor-not-allowed rounded-none font-medium shadow-md">
										Generar Diseño
									</button>
								</div>

							</form>
						</div>
					</div>
				</div>
			</main>

			<div class="fixed bottom-0 left-0 w-full p-4 md:p-6 pointer-events-none z-40">
				<div class="container mx-auto flex justify-between items-center">
					<button onclick="window.location.href='./designer-paso6.html'"
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 text-muted-foreground hover:text-foreground transition-colors bg-background/90 backdrop-blur-sm py-2.5 px-5 md:py-3 md:px-6 rounded-full shadow-md border border-border/50">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path>
						</svg>
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Volver</span>
					</button>
				</div>
			</div>

		</div>
	</div>
</body>
</html>
