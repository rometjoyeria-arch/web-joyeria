<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/png" href="./favicon.png">

	<title>Diseñador - Romet Jewelry AI</title>
	<link rel="stylesheet" crossorigin="" href="../designer-paso4_files/index-xtSdOPat.css?v=2">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/designer-integration.js"></script>
	<script>
		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				}
			});
			initHeaderAuth();
		});
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col pb-32 font-serif">

			<header class="bg-background border-b border-border px-4 md:px-8 py-4 md:py-6 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50 shadow-sm">

					<img src="../logo-romet.png" alt="Romet Joyería" style="height: 48px; width: auto; mix-blend-mode: multiply;">
				</a>
				<nav class="flex items-center flex-wrap justify-center gap-4 md:gap-8">
					<a href="https://rometjoyeria.com/designer-paso1.html"

					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">My Account</a>

			<div class="w-full bg-muted h-1.5 sticky top-[84px] z-40">

				</div>

				<div class="flex-1 relative">
					<div class="w-full" style="opacity: 1; transform: none;">
						<div class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-6xl mx-auto">

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'diamante')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img loading="lazy" src="../designer-paso4_files/diamante.png" alt="Diamond" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Diamond</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'esmeralda')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">

								</div>

							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'perla')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img loading="lazy" src="../designer-paso4_files/perla.png" alt="Perla" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Perla</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'zafiro')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img loading="lazy" src="../designer-paso4_files/zafiro.png" alt="Sapphire" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Sapphire</span>
							</div>

								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">

								</div>

								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img loading="lazy" src="../designer-paso4_files/rubi.png" alt="Ruby" loading="lazy" class="w-full h-full object-cover">

								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Ruby</span>

								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img loading="lazy" src="../designer-paso4_files/turquesa.png" alt="Turquesa" loading="lazy" class="w-full h-full object-cover">

							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'topacio')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border">
									<img loading="lazy" src="../designer-paso4_files/topacio.png" alt="Topacio" loading="lazy" class="w-full h-full object-cover">
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Topacio</span>
							</div>

							<div class="cursor-pointer flex flex-col items-center justify-center p-6 rounded-xl transition-all duration-300 border border-transparent hover:border-primary/30 hover:bg-primary/5" onclick="selectOption(this, 'gemstone', 'sin_gema')">
								<div class="w-[100px] h-[100px] mb-4 relative rounded-full overflow-hidden shadow-sm bg-white border border-border flex items-center justify-center">
									<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="hsl(0 0% 70%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
										<line x1="4" y1="4" x2="20" y2="20"/>
										<circle cx="12" cy="12" r="8"/>
									</svg>
								</div>
								<span class="text-foreground text-sm tracking-widest uppercase font-medium text-center">Sin Gema</span>
							</div>

						</div>
					</div>
				</div>
			</main>

			<div class="fixed bottom-0 left-0 w-full p-4 md:p-6 pointer-events-none z-40">
				<div class="container mx-auto flex justify-between items-center">
					<button onclick="window.location.href='./designer-paso3.html'"
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 text-muted-foreground hover:text-foreground transition-colors bg-background/90 backdrop-blur-sm py-2.5 px-5 md:py-3 md:px-6 rounded-full shadow-md border border-border/50">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path>
						</svg>
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Back</span>
					</button>
					<button id="nextBtn" onclick="goToNext('./designer-paso5.html')" disabled
					        class="pointer-events-auto flex items-center gap-2 md:gap-3 bg-primary text-primary-foreground hover:bg-foreground transition-colors py-2.5 px-6 md:py-3 md:px-8 rounded-full shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
						<span class="text-xs md:text-sm tracking-widest uppercase font-sans font-medium">Next</span>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
							<path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>
						</svg>
					</button>
				</div>
			</div>

		</div>
	</div>

	<script>
		function selectOption(el, key, value) {
			document.querySelectorAll('.cursor-pointer').forEach(e => {
				e.style.opacity = '0.5';
				e.classList.remove('border-primary', 'bg-primary/5', 'shadow-md', 'scale-105');
				e.classList.add('border-transparent');
			});
			el.style.opacity = '1';
			el.classList.remove('border-transparent');
			el.classList.add('border-primary', 'bg-primary/5', 'shadow-md', 'scale-105');
			const state = window.RometDesigner?.loadState() || {};
			state[key] = value;
			window.RometDesigner?.saveState(state);
			document.getElementById('nextBtn').disabled = false;
			setTimeout(() => goToNext('./designer-paso5.html'), 300);
		}

		function goToNext(url) {
			window.location.href = url;
		}
	</script>
</body>
</html>
