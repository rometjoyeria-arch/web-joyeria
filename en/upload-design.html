<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/png" href="./favicon.png">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sube tu Diseño - Romet Joyería</title>
	<link rel="stylesheet" crossorigin="" href="../upload-design_files/index-xtSdOPat.css?v=3">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/upload-integration.js"></script>
	<script>
		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				}
			});
			initHeaderAuth();
		});
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col font-serif">

			<header class="bg-background border-b border-border px-4 md:px-8 py-4 md:py-6 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50 shadow-sm">
				<a href="./index.html">
					<img src="../logo-romet.png" alt="Romet Joyería" class="h-14 md:h-[60px] w-auto" style="mix-blend-mode: multiply;">
				</a>
				<nav class="flex items-center flex-wrap justify-center gap-4 md:gap-8">
					<a href="https://rometjoyeria.com/designer-paso1.html"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Design Jewelry</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">My Account</a>
				</nav>
			</header>

			<main class="flex-1 container mx-auto px-4 py-12 md:py-20">
				<div class="max-w-4xl mx-auto" style="opacity: 1; transform: none;">

					<div class="text-center mb-12">
						<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium mb-4">Analyze Your Design</h1>
						<p class="text-muted-foreground font-sans tracking-wide max-w-2xl mx-auto">Upload a sketch or reference image and our AI will analyze the details.</p>
					</div>

					<div class="bg-white p-8 md:p-12 rounded-2xl shadow-lg border border-border/50 relative overflow-hidden">
						<form id="uploadForm" class="space-y-10">

							<div class="space-y-4">
								<label class="text-sm tracking-widest uppercase text-foreground font-medium block">Reference Image *</label>
								<div id="dropzone" class="border-2 border-dashed border-border hover:border-primary/50 hover:bg-muted/50 rounded-xl p-12 text-center cursor-pointer transition-all duration-300 flex flex-col items-center justify-center bg-muted/20">
									<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-10 h-10 text-muted-foreground mb-4">
										<path d="M12 13v8"></path>
										<path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
										<path d="m8 17 4-4 4 4"></path>
									</svg>
									<p class="text-foreground font-medium mb-2 font-sans text-base">Click to upload your sketch or image</p>
									<p class="text-sm text-muted-foreground font-sans">Supported formats: JPG, PNG, WEBP</p>
									<div id="imagePreview" style="display:none; margin-top:16px;">
										<img loading="lazy" id="previewImg" style="max-width:200px; max-height:200px; border-radius:8px;" />
										<p id="previewName" class="text-sm text-muted-foreground font-sans mt-2"></p>
									</div>
								</div>
								<input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" class="hidden">
							</div>

							<div class="space-y-2">
								<label class="text-sm tracking-widest uppercase text-foreground font-medium">AI Instructions</label>
								<textarea id="instructions" placeholder="Describe what you want to improve or change..."
								          class="w-full border border-border p-4 bg-transparent text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary transition-all duration-300 text-lg font-serif min-h-[120px] resize-y rounded-md"></textarea>
							</div>

							<div class="border-t border-border/50 pt-8">
								<h3 class="text-xl tracking-widest uppercase text-foreground font-medium mb-6">Design Details</h3>
								<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Category</label>
										<select id="category" class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans">
											<option value="medallas">Medallion</option>
											<option value="anillo">Ring</option>
											<option value="colgante">Pendant</option>
											<option value="pendientes">Earrings</option>
											<option value="pulsera">Bracelet</option>
											<option value="gemelos">Cufflinks</option>
										</select>
									</div>
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Material</label>
										<select id="material" class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans">
											<option value="oro_amarillo">Yellow Gold</option>
											<option value="oro_blanco">White Gold</option>
											<option value="oro_rosa">Rose Gold</option>
											<option value="platino">Platinum</option>
											<option value="plata">Silver</option>
										</select>
									</div>
								</div>
							</div>

							<div class="border-t border-border/50 pt-8">
								<h3 class="text-xl tracking-widest uppercase text-foreground font-medium mb-6">Your Details</h3>
								<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Name *</label>
										<input type="text" id="customerName" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans" value="">
									</div>
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Phone *</label>
										<input type="tel" id="customerPhone" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans" value="">
									</div>
									<div class="space-y-2 md:col-span-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Email *</label>
										<input type="email" id="customerEmail" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans" value="">
									</div>
								</div>
							</div>

							<div class="pt-6">
								<button type="submit" id="submitBtn" disabled
								        class="w-full py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-lg tracking-[0.2em] uppercase hover:bg-[hsl(var(--button-hover))] transition-colors duration-500 disabled:opacity-50 disabled:cursor-not-allowed rounded-none font-medium shadow-md">
									Generate Design
								</button>
							</div>

						</form>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script>
		const dropzone = document.getElementById('dropzone');
		const fileInput = document.getElementById('fileInput');
		const imagePreview = document.getElementById('imagePreview');
		const previewImg = document.getElementById('previewImg');
		const previewName = document.getElementById('previewName');
		const submitBtn = document.getElementById('submitBtn');

		let selectedFile = null;

		dropzone.addEventListener('click', () => fileInput.click());
		fileInput.addEventListener('change', (e) => {
			const file = e.target.files[0];
			if (file) handleFile(file);
		});
		dropzone.addEventListener('dragover', (e) => {
			e.preventDefault();
			dropzone.classList.add('border-primary');
		});
		dropzone.addEventListener('dragleave', () => {
			dropzone.classList.remove('border-primary');
		});
		dropzone.addEventListener('drop', (e) => {
			e.preventDefault();
			dropzone.classList.remove('border-primary');
			const file = e.dataTransfer.files[0];
			if (file) handleFile(file);
		});

		function handleFile(file) {
			selectedFile = file;
			const reader = new FileReader();
			reader.onload = (e) => {
				previewImg.src = e.target.result;
				previewName.textContent = file.name;
				imagePreview.style.display = 'block';
			};
			reader.readAsDataURL(file);
			checkFormValidity();
		}

		const requiredInputs = document.querySelectorAll('input[required]');
		requiredInputs.forEach(input => {
			input.addEventListener('input', checkFormValidity);
		});

		function checkFormValidity() {
			const name = document.getElementById('customerName').value.trim();
			const phone = document.getElementById('customerPhone').value.trim();
			const email = document.getElementById('customerEmail').value.trim();
			submitBtn.disabled = !(selectedFile && name && phone && email);
		}

		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) return;
				const user = session.user;
				const nameInput = document.getElementById('customerName');
				const emailInput = document.getElementById('customerEmail');
				if (nameInput && !nameInput.value) {
					nameInput.value = user.user_metadata?.full_name ||
					                  ((user.user_metadata?.first_name || '') + ' ' + (user.user_metadata?.last_name || '')).trim();
				}
				if (emailInput && !emailInput.value) {
					emailInput.value = user.email || '';
				}
				checkFormValidity();
			});
		});

		document.getElementById('uploadForm').addEventListener('submit', async (e) => {
			e.preventDefault();

			const nombre = document.getElementById('customerName').value.trim();
			const telefono = document.getElementById('customerPhone').value.trim();
			const email = document.getElementById('customerEmail').value.trim();
			const categoria = document.getElementById('category').value;
			const material = document.getElementById('material').value;
			const instrucciones = document.getElementById('instructions').value.trim();

			submitBtn.disabled = true;
			submitBtn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px;"><svg style="animation:spin 1s linear infinite" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>Generando tu diseño con IA...</span>';

			try {
				let imagenSubidaUrl = null;
				try {
					imagenSubidaUrl = await uploadImage(selectedFile, 'disenos');
				} catch (uploadError) {
					console.warn('Error subiendo imagen:', uploadError);
				}

				const result = await callEdgeFunction('Joyas', {
					nombre,
					telefono,
					email,
					categoria_producto: categoria,
					material,
					sugerencias: instrucciones,
					imagen_subida_url: imagenSubidaUrl,
				});

				showUploadSuccess({ nombre, email, categoria, material }, result?.imagenUrl || null);

			} catch (error) {
				console.error('Error:', error);
				submitBtn.disabled = false;
				submitBtn.textContent = 'Generate Design';
				alert('Ha ocurrido un error. Por favor, inténtalo de nuevo.');
			}
		});

		let _uploadState = {};

		function showUploadSuccess(data, imagenUrl) {
			_uploadState = { data, imagenUrl };
			const main = document.querySelector('main');
			if (!main) return;

			main.innerHTML = `
				<div class="max-w-3xl mx-auto px-4 py-12 text-center">
					<div class="mb-8">
						<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none"
						     stroke="hsl(120, 40%, 40%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
						     style="margin: 0 auto 1.5rem;">
							<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
							<polyline points="22 4 12 14.01 9 11.01"/>
						</svg>
						<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium mb-4">
							¡Diseño Generado!
						</h1>
						<p class="text-muted-foreground font-sans tracking-wide max-w-lg mx-auto text-lg">
							Hemos recibido tu solicitud, <strong>${data.nombre}</strong>.
							Te contactaremos pronto en <strong>${data.email}</strong>.
						</p>
					</div>

					${imagenUrl ? `
					<div class="bg-white p-8 rounded-2xl shadow-lg border border-border/50 mb-8">
						<h2 class="text-xl tracking-widest uppercase text-foreground font-medium mb-4">Tu Diseño Generado</h2>
						<div id="imagen-generada">
							<img loading="lazy" src="${imagenUrl}" style="max-width:100%; border-radius:8px;" />
						</div>
					</div>` : `
					<div class="bg-white p-8 rounded-2xl shadow-lg border border-border/50 mb-8">
						<div id="imagen-generada">
							<p class="text-muted-foreground font-sans">
								Tu diseño está siendo procesado. Recibirás un email con el resultado en breve.
							</p>
						</div>
					</div>`}

					<div id="cambios-panel" style="display:none;" class="bg-white p-6 rounded-2xl shadow-lg border border-border/50 mb-6 text-left">
						<p class="text-sm tracking-widest uppercase text-muted-foreground font-sans font-medium mb-3">Describe los cambios</p>
						<textarea id="cambios-texto"
						          placeholder="Escribe los cambios con los que quieras ajustar el diseño..."
						          class="w-full border border-border p-4 bg-transparent text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-serif min-h-[100px] resize-y rounded-md mb-3"></textarea>
						<p style="color: #e53e3e; font-size: 0.8rem; font-family: ui-sans-serif, system-ui, sans-serif; margin-bottom: 12px;">
							⚠️ Este cambio consumirá 1 crédito
						</p>
						<button id="redesign-btn"
						        onclick="(function(){
						        	const cambios = document.getElementById('cambios-texto').value.trim();
						        	if (!cambios) return;
						        	window._uploadRedisenar(cambios);
						        })()"
						        style="background: hsl(0 0% 0%); color: hsl(0 0% 80%); padding: 12px 32px;
						               font-family: ui-sans-serif, system-ui, sans-serif; font-size: 0.8rem;
						               letter-spacing: 0.2em; text-transform: uppercase; border: none;
						               cursor: pointer; transition: opacity 0.3s;">
							Rediseñar
						</button>
					</div>

					<div class="bg-white p-6 rounded-2xl shadow-lg border border-border/50 text-left mb-8">
						<h2 class="text-xl tracking-widest uppercase text-foreground font-medium mb-4">Resumen</h2>
						<div class="grid grid-cols-2 gap-4 font-sans text-sm">
							${data.categoria ? `<div><span class="text-muted-foreground">Category:</span> <strong class="capitalize">${data.categoria}</strong></div>` : ''}
							${data.material ? `<div><span class="text-muted-foreground">Material:</span> <strong class="capitalize">${data.material.replace(/_/g, ' ')}</strong></div>` : ''}
						</div>
					</div>

					<div style="max-width: 400px; margin: 0 auto;">
						<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
							<button onclick="window._uploadToggleCambios()"
							        style="background: hsl(0 0% 0%); color: hsl(0 0% 75%);
							               font-family: 'Cormorant Garamond', serif; font-size: 2rem;
							               font-weight: 400; letter-spacing: 0.03em;
							               border: none; cursor: pointer; transition: opacity 0.3s;
							               text-align: center; width: 185px; height: 185px;
							               display: flex; align-items: center; justify-content: center;
							               padding: 16px; line-height: 1.3;">
								¿Quieres hacer algún cambio?
							</button>
							<a href="#"
							   style="display: block; text-decoration: none;
							          width: 185px; height: 185px;
							          cursor: pointer; overflow: hidden;">
								<img loading="lazy" src="../designer-paso7_files/Meneses-joyas-stl-dis.png"
								     style="width: 100%; height: 100%; object-fit: cover; display: block;" />
							</a>
						</div>
						<div style="text-align: center; padding-top: 8px;">
							<a href="./index.html"
							   style="color: hsl(0 0% 0%); font-family: ui-sans-serif, system-ui, sans-serif;
							          font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
							          text-decoration: none; transition: opacity 0.3s; display: inline-block;
							          padding: 12px 32px;">
								Back al Inicio
							</a>
						</div>
					</div>

				</div>
			`;

			window._uploadToggleCambios = () => {
				const panel = document.getElementById('cambios-panel');
				if (!panel) return;
				panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
			};

			window._uploadRedisenar = async (cambios) => {
				const redesignBtn = document.getElementById('redesign-btn');
				const imagenContainer = document.getElementById('imagen-generada');
				if (redesignBtn) {
					redesignBtn.disabled = true;
					redesignBtn.textContent = 'Rediseñando...';
				}
				if (imagenContainer) {
					imagenContainer.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;"><svg style="animation:spin 1s linear infinite" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></div>';
				}
				try {
					const result = await callEdgeFunction('Joyas', {
						nombre: _uploadState.data.nombre,
						email: _uploadState.data.email,
						categoria_producto: _uploadState.data.categoria,
						material: _uploadState.data.material,
						sugerencias: 'Cambios solicitados: ' + cambios,
					});
					if (imagenContainer && result?.imagenUrl) {
						imagenContainer.innerHTML = `<img loading="lazy" src="${result.imagenUrl}" style="max-width:100%; border-radius:8px;" />`;
					}
					const panel = document.getElementById('cambios-panel');
					if (panel) panel.style.display = 'none';
				} catch (err) {
					console.error('Error rediseñando:', err);
					if (imagenContainer) {
						imagenContainer.innerHTML = '<p style="color:#888;text-align:center;">Error al rediseñar. Inténtalo de nuevo.</p>';
					}
				}
				if (redesignBtn) {
					redesignBtn.disabled = false;
					redesignBtn.textContent = 'Rediseñar';
				}
			};
		}
	</script>

	<style>
		@keyframes spin { to { transform: rotate(360deg); } }
	</style>

</body>
</html>
