<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/png" href="./favicon.png">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sube tu Diseño - Romet Joyería</title>
	<link rel="stylesheet" crossorigin="" href="../upload-design_files/index-xtSdOPat.css?v=3">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="./js/supabase-config.js"></script>
	<script src="./js/upload-integration.js"></script>
	<script>
		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				}
			});
			initHeaderAuth();
		});
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen bg-background flex flex-col font-serif">

			<header class="bg-background border-b border-border px-4 md:px-8 py-4 md:py-6 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50 shadow-sm">
				<a style="display:flex; align-items:center; gap:16px; text-decoration:none;" href="./index.html">
					<img src="../logo-romet.png" alt="Romet Joyería Logo" style="height: 45px; width: auto; mix-blend-mode: multiply; transform: scale(1.7); transform-origin: left center; margin-right: 18px;">
					<span class="hidden md:block text-2xl tracking-[0.2em] uppercase font-bold whitespace-nowrap text-foreground" style="font-family: 'Cormorant Garamond', serif; letter-spacing: 0.15em;">Romet Joyería</span>
				</a>
				<nav class="flex items-center flex-wrap justify-center gap-4 md:gap-8">
					<a href="https://rometjoyeria.com/designer-paso1.html"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">Design Jewelry</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">My Account</a>
				</nav>
			</header>

			<main class="flex-1 container mx-auto px-4 py-12 md:py-20">
				<div class="max-w-4xl mx-auto" style="opacity: 1; transform: none;">

					<div class="text-center mb-12">
						<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium mb-4">Analyze Your Design</h1>
						<p class="text-muted-foreground font-sans tracking-wide max-w-2xl mx-auto">Upload a sketch or reference image and our AI will analyze the details.</p>
					</div>

					<div class="bg-white p-8 md:p-12 rounded-2xl shadow-lg border border-border/50 relative overflow-hidden">
						<form id="uploadForm" class="space-y-10">

							<div class="space-y-4">
								<label class="text-sm tracking-widest uppercase text-foreground font-medium block">Reference Image *</label>
								<div id="dropzone" class="border-2 border-dashed border-border hover:border-primary/50 hover:bg-muted/50 rounded-xl p-12 text-center cursor-pointer transition-all duration-300 flex flex-col items-center justify-center bg-muted/20">
									<svg id="dropzone-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-10 h-10 text-muted-foreground mb-4">
										<path d="M12 13v8"></path>
										<path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
										<path d="m8 17 4-4 4 4"></path>
									</svg>
									<p id="dropzone-text1" class="text-foreground font-medium mb-2 font-sans text-base">Click to upload your sketch or image</p>
									<p id="dropzone-text2" class="text-sm text-muted-foreground font-sans">Supported formats: JPG, PNG, WEBP</p>
									<div id="imagePreviewContainer" class="flex flex-wrap gap-4 justify-center mt-6 w-full hidden">
										<!-- Dynamically populated previews -->
									</div>
									<p id="dropzone-hint" class="text-xs text-muted-foreground font-sans mt-3 hidden">Click to change or upload another image (max. 2)</p>
								</div>
								<input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" multiple class="hidden">
							</div>

							<div class="space-y-2">
								<label class="text-sm tracking-widest uppercase text-foreground font-medium">AI Instructions</label>
								<textarea id="instructions" placeholder="Describe what you want to improve or change..."
								          class="w-full border border-border p-4 bg-transparent text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary transition-all duration-300 text-lg font-serif min-h-[120px] resize-y rounded-md"></textarea>
							</div>

							<div class="border-t border-border/50 pt-8">
								<h3 class="text-xl tracking-widest uppercase text-foreground font-medium mb-6">Design Details</h3>
								<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Category</label>
										<select id="category" class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans">
											<option value="medallas">Medallion</option>
											<option value="anillo">Ring</option>
											<option value="colgante">Pendant</option>
											<option value="pendientes">Earrings</option>
											<option value="pulsera">Bracelet</option>
											<option value="gemelos">Cufflinks</option>
										</select>
									</div>
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Material</label>
										<select id="material" class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans">
											<option value="oro_amarillo">Yellow Gold</option>
											<option value="oro_blanco">White Gold</option>
											<option value="oro_rosa">Rose Gold</option>
											<option value="platino">Platinum</option>
											<option value="plata">Silver</option>
										</select>
									</div>
								</div>
							</div>

							<div class="border-t border-border/50 pt-8">
								<h3 class="text-xl tracking-widest uppercase text-foreground font-medium mb-6">Your Details</h3>
								<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Name *</label>
										<input type="text" id="customerName" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans" value="">
									</div>
									<div class="space-y-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Phone *</label>
										<input type="tel" id="customerPhone" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans" value="">
									</div>
									<div class="space-y-2 md:col-span-2">
										<label class="text-xs tracking-widest uppercase text-muted-foreground font-medium">Email *</label>
										<input type="email" id="customerEmail" required
										       class="w-full border-b border-border py-3 bg-transparent text-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-sans" value="">
									</div>
								</div>
							</div>

							<div class="pt-6">
								<button type="submit" id="submitBtn" disabled
								        class="w-full py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-lg tracking-[0.2em] uppercase hover:bg-[hsl(var(--button-hover))] transition-colors duration-500 disabled:opacity-50 disabled:cursor-not-allowed rounded-none font-medium shadow-md">
									Generate Design
								</button>
							</div>

						</form>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script>
		const dropzone = document.getElementById('dropzone');
		const fileInput = document.getElementById('fileInput');
		const submitBtn = document.getElementById('submitBtn');

		let selectedFiles = [];

		dropzone.addEventListener('click', (e) => {
			if (e.target.closest('button')) return;
			fileInput.click();
		});
		fileInput.addEventListener('change', (e) => {
			const files = Array.from(e.target.files);
			handleFiles(files);
			fileInput.value = '';
		});
		dropzone.addEventListener('dragover', (e) => {
			e.preventDefault();
			dropzone.classList.add('border-primary');
		});
		dropzone.addEventListener('dragleave', () => {
			dropzone.classList.remove('border-primary');
		});
		dropzone.addEventListener('drop', (e) => {
			e.preventDefault();
			dropzone.classList.remove('border-primary');
			const files = Array.from(e.dataTransfer.files);
			handleFiles(files);
		});

		function handleFiles(files) {
			const newFiles = files.filter(file => file.type.startsWith('image/'));
			if (newFiles.length === 0) return;

			for (let file of newFiles) {
				if (selectedFiles.length < 2) {
					if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
						selectedFiles.push(file);
					}
				} else {
					alert('You can upload up to 2 images.');
					break;
				}
			}
			renderPreviews();
			checkFormValidity();
		}

		function removeUploadedFile(index, event) {
			if (event) event.stopPropagation();
			selectedFiles.splice(index, 1);
			renderPreviews();
			checkFormValidity();
		}

		function renderPreviews() {
			const container = document.getElementById('imagePreviewContainer');
			const dropzone = document.getElementById('dropzone');
			const icon = document.getElementById('dropzone-icon');
			const text1 = document.getElementById('dropzone-text1');
			const text2 = document.getElementById('dropzone-text2');
			const hint = document.getElementById('dropzone-hint');

			container.innerHTML = '';
			if (selectedFiles.length === 0) {
				container.classList.add('hidden');
				if (icon) icon.classList.remove('hidden');
				if (text1) text1.classList.remove('hidden');
				if (text2) text2.classList.remove('hidden');
				if (hint) hint.classList.add('hidden');
				if (dropzone) {
					dropzone.style.padding = "48px";
				}
				return;
			}
			container.classList.remove('hidden');
			if (icon) icon.classList.add('hidden');
			if (text1) text1.classList.add('hidden');
			if (text2) text2.classList.add('hidden');
			if (hint) hint.classList.remove('hidden');
			if (dropzone) {
				dropzone.style.padding = "16px";
			}

			selectedFiles.forEach((file, index) => {
				const reader = new FileReader();
				reader.onload = (e) => {
					const card = document.createElement('div');
					card.className = "relative group border border-border bg-white shadow-sm flex flex-col items-center";
					card.style.width = "60px";
					card.style.padding = "4px";
					card.style.borderRadius = "8px";
					card.addEventListener('click', (ev) => ev.stopPropagation());
					card.innerHTML = `
						<div style="width: 52px; height: 52px; border-radius: 6px; overflow: hidden; background: #f3f4f6; display: flex; align-items: center; justify-content: center;">
							<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover; display: block;" />
						</div>
						<p style="font-size: 8px; color: #6b7280; font-family: ui-sans-serif, system-ui, sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin-top: 3px; text-align: center;" title="${file.name}">${file.name}</p>
						<button type="button" style="position: absolute; top: -5px; right: -5px; background: black; color: white; border-radius: 9999px; width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border: 1px solid white; font-size: 9px; line-height: 1; cursor: pointer; padding: 0; z-index: 10;">&times;</button>
					`;
					card.querySelector('button').addEventListener('click', (ev) => removeUploadedFile(index, ev));
					container.appendChild(card);
				};
				reader.readAsDataURL(file);
			});
		}

		const requiredInputs = document.querySelectorAll('input[required]');
		requiredInputs.forEach(input => {
			input.addEventListener('input', checkFormValidity);
		});

		function checkFormValidity() {
			const name = document.getElementById('customerName').value.trim();
			const phone = document.getElementById('customerPhone').value.trim();
			const email = document.getElementById('customerEmail').value.trim();
			submitBtn.disabled = !(selectedFiles.length > 0 && name && phone && email);
		}

		initWhenReady(() => {
			getSession().then((session) => {
				if (!session) return;
				const user = session.user;
				const nameInput = document.getElementById('customerName');
				const emailInput = document.getElementById('customerEmail');
				if (nameInput && !nameInput.value) {
					nameInput.value = user.user_metadata?.full_name ||
					                  ((user.user_metadata?.first_name || '') + ' ' + (user.user_metadata?.last_name || '')).trim();
				}
				if (emailInput && !emailInput.value) {
					emailInput.value = user.email || '';
				}
				checkFormValidity();
			});
		});

		document.getElementById('uploadForm').addEventListener('submit', async (e) => {
			e.preventDefault();

			const nombre = document.getElementById('customerName').value.trim();
			const telefono = document.getElementById('customerPhone').value.trim();
			const email = document.getElementById('customerEmail').value.trim();
			const categoria = document.getElementById('category').value;
			const material = document.getElementById('material').value;
			const instrucciones = document.getElementById('instructions').value.trim();

			submitBtn.disabled = true;
			const originalBtnHtml = submitBtn.innerHTML;
			submitBtn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px;"><svg style="animation:spin 1s linear infinite" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>Generating design with AI...</span>';

			try {
				const hasCredits = typeof consumeCredit === 'function' ? await consumeCredit() : true;
				if (!hasCredits) {
					if (typeof window.showOutOfCreditsModal === 'function') window.showOutOfCreditsModal();
					else alert('Not enough credits.');
					submitBtn.disabled = false;
					submitBtn.innerHTML = originalBtnHtml;
					return;
				}
			} catch(e) {}

			try {
				let imagenSubidaUrl = null;
				let imagenSubidaUrl2 = null;
				try {
					if (selectedFiles[0]) {
						imagenSubidaUrl = await uploadImage(selectedFiles[0], 'disenos');
					}
					if (selectedFiles[1]) {
						imagenSubidaUrl2 = await uploadImage(selectedFiles[1], 'disenos');
					}
				} catch (uploadError) {
					console.warn('Error uploading images:', uploadError);
				}

				const result = await callEdgeFunction('Joyas', {
					nombre,
					telefono,
					email,
					categoria_producto: categoria,
					material,
					sugerencias: instrucciones,
					imagen_subida_url: imagenSubidaUrl,
					imagen_subida_url2: imagenSubidaUrl2,
				});

				showUploadSuccess({ nombre, email, categoria, material }, result?.imagenUrl || null);

			} catch (error) {
				console.error('Error:', error);
				submitBtn.disabled = false;
				submitBtn.textContent = 'Generate Design';
				alert('Ha ocurrido un error. Por favor, inténtalo de nuevo.');
			}
		});

		let _uploadState = {};

		function showUploadSuccess(data, imagenUrl) {
			_uploadState = { data, imagenUrl };
			const main = document.querySelector('main');
			if (!main) return;

			main.innerHTML = `
				<div class="max-w-3xl mx-auto px-4 py-12 text-center">
					<div class="mb-8">
						<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none"
						     stroke="hsl(120, 40%, 40%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
						     style="margin: 0 auto 1.5rem;">
							<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
							<polyline points="22 4 12 14.01 9 11.01"/>
						</svg>
						<h1 class="text-4xl md:text-5xl text-foreground tracking-widest uppercase font-medium mb-4">
							Design Generated!
						</h1>
						<p class="text-muted-foreground font-sans tracking-wide max-w-lg mx-auto text-lg">
							We have received your request, <strong>${data.nombre}</strong>.
							We will contact you soon at <strong>${data.email}</strong>.
						</p>
					</div>

					${imagenUrl ? `
					<div class="bg-white p-8 rounded-2xl shadow-lg border border-border/50 mb-8">
						<h2 class="text-xl tracking-widest uppercase text-foreground font-medium mb-4">Your Design — Four Views</h2>
						<div id="imagen-generada" style="text-align:center;">
							<img loading="lazy" src="${imagenUrl}" style="width:100%; max-width:900px; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.08);" alt="Generated Design — Front · Back · Side · On Model" />
							<p style="font-size:0.7rem; color:#aaa; margin-top:8px; font-family:sans-serif; letter-spacing:0.12em; text-transform:uppercase;">Front · Back · Side · On Model</p>
						</div>
					</div>` : `
					<div class="bg-white p-8 rounded-2xl shadow-lg border border-border/50 mb-8">
						<div id="imagen-generada">
							<p class="text-muted-foreground font-sans">
								Your design is being processed. You will receive an email with the result shortly.
							</p>
						</div>
					</div>`}

					<div id="cambios-panel" style="display:none;" class="bg-white p-6 rounded-2xl shadow-lg border border-border/50 mb-6 text-left">
						<div class="flex justify-between items-center mb-3">
							<p class="text-sm tracking-widest uppercase text-muted-foreground font-sans font-medium">Describe the changes</p>
							<button type="button" onclick="document.getElementById('cambios-texto').value = ''; this.style.display='none';" class="text-xs text-primary/70 hover:text-primary font-sans underline cursor-pointer">🗑️ Clear template</button>
						</div>
						<textarea id="cambios-texto"
						          rows="8"
						          class="w-full border border-border p-4 bg-transparent text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary transition-all duration-300 text-base font-serif resize-y rounded-md mb-3"
						          style="min-height: 280px !important; height: 280px !important;">[Edit this template to describe your changes so the AI can execute them precisely]
- WHAT TO KEEP IDENTICAL: (e.g., The face engraving in the center)
- WHAT TO CHANGE OR ADD: (e.g., Add a simple decorative border)
- METAL DETAILS: (e.g., Change from yellow gold to silver)
- PIECE TYPE: (e.g., Change from a pendant to earrings)</textarea>
						<p style="color: #e53e3e; font-size: 0.8rem; font-family: ui-sans-serif, system-ui, sans-serif; margin-bottom: 12px;">
							⚠️ This change will consume 1 credit
						</p>
						<button id="redesign-btn"
						        onclick="(function(){
						        	const cambios = document.getElementById('cambios-texto').value.trim();
						        	if (!cambios || cambios.startsWith('[Edit this template')) {
						        		alert('Please edit the template with your requested changes.');
						        		return;
						        	}
						        	window._uploadRedisenar(cambios);
						        })()"
						        style="background: hsl(0 0% 0%); color: hsl(0 0% 80%); padding: 12px 32px;
						               font-family: ui-sans-serif, system-ui, sans-serif; font-size: 0.8rem;
						               letter-spacing: 0.2em; text-transform: uppercase; border: none;
						               cursor: pointer; transition: opacity 0.3s;">
							Redesign
						</button>
					</div>

					<div class="bg-white p-6 rounded-2xl shadow-lg border border-border/50 text-left mb-8">
						<h2 class="text-xl tracking-widest uppercase text-foreground font-medium mb-4">Summary</h2>
						<div class="grid grid-cols-2 gap-4 font-sans text-sm">
							${data.categoria ? `<div><span class="text-muted-foreground">Category:</span> <strong class="capitalize">${data.categoria}</strong></div>` : ''}
							${data.material ? `<div><span class="text-muted-foreground">Material:</span> <strong class="capitalize">${data.material.replace(/_/g, ' ')}</strong></div>` : ''}
						</div>
					</div>

					<div style="max-width: 400px; margin: 0 auto;">
						<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
							<button onclick="window._uploadToggleCambios()"
							        style="background: hsl(0 0% 0%); color: hsl(0 0% 75%);
							               font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
							               font-weight: 400; letter-spacing: 0.03em;
							               border: none; cursor: pointer; transition: opacity 0.3s;
							               text-align: center; width: 185px; height: 185px;
							               display: flex; align-items: center; justify-content: center;
							               padding: 16px; line-height: 1.3;">
								WOULD YOU LIKE TO MAKE ANY CHANGES?
							</button>
							<a href="#"
							   style="display: block; text-decoration: none;
							          width: 185px; height: 185px;
							          cursor: pointer; overflow: hidden;">
								<img loading="lazy" src="../designer-paso7_files/Meneses-joyas-stl-dis.png"
								     style="width: 100%; height: 100%; object-fit: cover; display: block;" />
							</a>
						</div>
						<div style="text-align: center; padding-top: 8px;">
							<a href="./index.html"
							   style="color: hsl(0 0% 0%); font-family: ui-sans-serif, system-ui, sans-serif;
							          font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
							          text-decoration: none; transition: opacity 0.3s; display: inline-block;
							          padding: 12px 32px;">
								Back to Home
							</a>
						</div>
					</div>

				</div>
			`;

			window._uploadToggleCambios = () => {
				const panel = document.getElementById('cambios-panel');
				if (!panel) return;
				panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
			};

			window._uploadRedisenar = async (cambios) => {
				const redesignBtn = document.getElementById('redesign-btn');
				const imagenContainer = document.getElementById('imagen-generada');
				const prevImgHTML = imagenContainer ? imagenContainer.innerHTML : '';
				if (redesignBtn) {
					redesignBtn.disabled = true;
					redesignBtn.textContent = 'Redesigning...';
				}

				try {
					const hasCredits = typeof consumeCredit === 'function' ? await consumeCredit() : true;
					if (!hasCredits) {
						if (typeof window.showOutOfCreditsModal === 'function') window.showOutOfCreditsModal();
						else alert('Not enough credits.');
						if (redesignBtn) {
							redesignBtn.disabled = false;
							redesignBtn.textContent = 'Redesign';
						}
						return;
					}
				} catch(e) {}

				if (imagenContainer) {
					imagenContainer.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;"><svg style="animation:spin 1s linear infinite" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></div>';
				}
				try {
					const result = await callEdgeFunction('Joyas', {
						nombre: _uploadState.data.nombre,
						email: _uploadState.data.email,
						categoria_producto: _uploadState.data.categoria,
						material: _uploadState.data.material,
						sugerencias: 'Cambios solicitados: ' + cambios,
					});
					if (imagenContainer && result?.imagenUrl) {
						imagenContainer.innerHTML = `<img loading="lazy" src="${result.imagenUrl}" style="width:100%; max-width:900px; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.08);" alt="Redesigned Design — Front · Back · Side · On Model" />
						<p style="font-size:0.7rem; color:#aaa; margin-top:8px; font-family:sans-serif; letter-spacing:0.12em; text-transform:uppercase; text-align:center;">Front · Back · Side · On Model</p>`;
					}
					const panel = document.getElementById('cambios-panel');
					if (panel) panel.style.display = 'none';
				} catch (err) {
					console.error('Error redesigning:', err);
					if (imagenContainer) {
						imagenContainer.innerHTML = '<p style="color:#888;text-align:center;">Error redesigning. Try again.</p>';
					}
				}
				if (redesignBtn) {
					redesignBtn.disabled = false;
					redesignBtn.textContent = 'Redesign';
				}
			};
		}
	</script>

	<style>
		@keyframes spin { to { transform: rotate(360deg); } }
	</style>

</body>
</html>
