<!DOCTYPE html>
<html lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="icon" type="image/png" href="../favicon.png">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Romet Jewelry AI - Fine Jewelry</title>
	<meta name="description" content="Design your custom jewelry with artificial intelligence or upload your own sketch.">
	<link rel="stylesheet" crossorigin="" href="../index_files/index-xtSdOPat.css?v=2">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
	<script src="../js/supabase-config.js"></script>
	<script>
		window.addEventListener('load', () => initWhenReady(() => {
			getSession().then((session) => {
				if (!session) {
					sessionStorage.setItem('redirectAfterLogin', window.location.href);
					window.location.href = './login.html';
				} else {
					initHeaderAuth();
				}
			});
		}));
	</script>
</head>
<body>
	<div id="root">
		<div class="min-h-screen flex flex-col relative bg-background overflow-hidden">
			<header class="bg-background border-b border-border px-4 md:px-8 py-4 md:py-6 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50 shadow-sm">
				<a class="hover:opacity-70 transition-opacity" href="./index.html">
					<span class="font-bold text-2xl md:text-3xl tracking-[0.2em] uppercase text-foreground">ROMET AI</span>
				</a>
				<nav class="flex items-center gap-4 md:gap-8">
					<a href="./designer-paso1.html"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">
						Design Jewelry
					</a>
					<a href="./login.html" id="header-auth-link"
					   class="text-sm md:text-base tracking-[0.15em] uppercase text-foreground hover:text-muted-foreground transition-colors font-medium"
					   style="text-decoration:none;">
						My Account
					</a>
					<div class="flex items-center gap-2 border-l border-border pl-4 md:pl-8">
						<a href="../index.html" class="text-sm md:text-base text-foreground hover:text-[hsl(var(--button-bg))] transition-colors tracking-widest" style="text-decoration:none;">ES</a>
						<span class="text-sm md:text-base text-muted-foreground">|</span>
						<a href="#" class="text-sm md:text-base font-bold text-[hsl(var(--button-bg))] tracking-widest" style="text-decoration:none;">EN</a>
					</div>
				</nav>
			</header>
			<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-white rounded-full blur-[120px] opacity-50 pointer-events-none"></div>
			<main class="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-6">
				<div class="max-w-5xl mx-auto flex flex-col items-center w-full" style="opacity: 1; transform: none;">
					<h1 class="text-5xl md:text-7xl lg:text-8xl font-bold text-foreground mb-6 tracking-[0.1em] leading-tight">
						ROMET JEWELRY
					</h1>
					<p class="text-xl md:text-2xl text-muted-foreground mb-16 font-light tracking-[0.2em] max-w-2xl uppercase">
						Custom Fine Jewelry
					</p>
					<div class="flex flex-col sm:flex-row gap-4 md:gap-6 items-stretch justify-center w-full max-w-4xl mx-auto">
						<a href="./designer-paso1.html"
						   class="flex-1 px-4 py-4 md:px-8 md:py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-xs md:text-base tracking-[0.1em] md:tracking-[0.2em] uppercase rounded-none hover:bg-[hsl(var(--button-hover))] transition-all duration-500 elegant-shadow font-medium flex items-center justify-center text-center min-h-[56px] md:min-h-[64px]"
						   style="text-decoration:none;">
							Design your jewelry from scratch
						</a>
						<a href="./upload-design.html"
						   class="flex-1 px-4 py-4 md:px-8 md:py-5 bg-[hsl(var(--button-bg))] text-[hsl(var(--button-text))] text-xs md:text-base tracking-[0.1em] md:tracking-[0.2em] uppercase rounded-none hover:bg-[hsl(var(--button-hover))] transition-all duration-500 elegant-shadow font-medium flex items-center justify-center text-center min-h-[56px] md:min-h-[64px]"
						   style="text-decoration:none;">
							Have a sketch? We'll make it
						</a>
					</div>
				</div>
			</main>
		</div>
	</div>
</body>
</html>
